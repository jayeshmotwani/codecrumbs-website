<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Body -->
  <ellipse cx="16" cy="20" rx="9" ry="10" fill="#4F46E5"/>
  <!-- Head -->
  <circle cx="16" cy="11" r="7" fill="#6366F1"/>
  <!-- Beak -->
  <polygon points="16,13 20,15 16,17" fill="#F59E0B"/>
  <!-- Eye -->
  <circle cx="18" cy="10" r="1.5" fill="white"/>
  <circle cx="18.5" cy="10" r="0.7" fill="#1E1B4B"/>
  <!-- Wing left -->
  <ellipse cx="8" cy="20" rx="4" ry="6" fill="#818CF8" transform="rotate(-15 8 20)"/>
  <!-- Wing right -->
  <ellipse cx="24" cy="20" rx="4" ry="6" fill="#818CF8" transform="rotate(15 24 20)"/>
  <!-- Tail feathers -->
  <ellipse cx="12" cy="30" rx="2.5" ry="4" fill="#A5B4FC" transform="rotate(-20 12 30)"/>
  <ellipse cx="16" cy="31" rx="2.5" ry="4" fill="#C7D2FE"/>
  <ellipse cx="20" cy="30" rx="2.5" ry="4" fill="#A5B4FC" transform="rotate(20 20 30)"/>
  <!-- Crest -->
  <ellipse cx="14" cy="5" rx="1.5" ry="3" fill="#EF4444" transform="rotate(-15 14 5)"/>
  <ellipse cx="16" cy="4" rx="1.5" ry="3" fill="#F97316"/>
  <ellipse cx="18" cy="5" rx="1.5" ry="3" fill="#EF4444" transform="rotate(15 18 5)"/>
</svg>
